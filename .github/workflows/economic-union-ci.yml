name: Economic Union CI

on:
  push:
    paths:
      - ".github/workflows/economic-union-ci.yml"
      - "code/economic-union/**"
  pull_request:
    paths:
      - ".github/workflows/economic-union-ci.yml"
      - "code/economic-union/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: economic-union-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript and Vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/economic-union

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Record Node.js and npm versions
        run: |
          node --version
          npm --version

      - name: Install locked npm dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  foundry:
    name: Foundry
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/economic-union/contracts

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
          cache: false

      - name: Record Foundry versions
        run: |
          forge --version
          cast --version
          anvil --version
          chisel --version

      - name: Check Solidity formatting
        run: forge fmt --check

      - name: Build contracts
        run: forge build

      - name: Test contracts
        run: forge test