<!DOCTYPE html>
<html>
<head>
  <title>Time Event Logger</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
    }

    input, button {
      display: block;
      width: 100%;
      margin-bottom: 12px;
      padding: 12px;
      font-size: 16px;
    }

    .log-card {
      border: 1px solid #ccc;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      background: #f8f8f8;
    }
  </style>
</head>
<body>

  <h1>Time Event Logger</h1>

  <input id="eventName" placeholder="Event name, e.g. Started programming, Cleaned desk, Took photo">

  <button id="logButton" type="button">Log Event Now</button>
  <button id="exportButton" type="button">Export Logs JSON</button>
  <button id="wipeButton" type="button">Wipe Logs</button>

  <h2>Logs</h2>
  <div id="logList"></div>

  <script>
    let logs = JSON.parse(localStorage.getItem("timeLogs")) || [];

    const logButton = document.getElementById("logButton");
    const exportButton = document.getElementById("exportButton");
    const wipeButton = document.getElementById("wipeButton");

    logButton.addEventListener("click", logEventNow);
    exportButton.addEventListener("click", exportLogs);
    wipeButton.addEventListener("click", wipeLogs);

    renderLogs();

    function logEventNow() {
      const now = new Date();

      const logEntry = {
        id: Date.now(),
        event_name: document.getElementById("eventName").value || "Unnamed event",
        timestamp_iso: now.toISOString(),
        date_local: now.toLocaleDateString(),
        time_local: now.toLocaleTimeString()
      };

      logs.push(logEntry);

      saveLogs();
      renderLogs();

      document.getElementById("eventName").value = "";

      console.log("Logged:", logEntry);
    }

    function saveLogs() {
      localStorage.setItem("timeLogs", JSON.stringify(logs));
    }

    function renderLogs() {
      const logList = document.getElementById("logList");

      logList.innerHTML = "";

      for (const logEntry of logs) {
        const card = document.createElement("div");
        card.className = "log-card";

        card.innerHTML = `
          <p><strong>Event:</strong> ${logEntry.event_name}</p>
          <p><strong>Date:</strong> ${logEntry.date_local}</p>
          <p><strong>Time:</strong> ${logEntry.time_local}</p>
          <p><strong>ISO:</strong> ${logEntry.timestamp_iso}</p>
        `;

        logList.prepend(card);
      }
    }

    function exportLogs() {
      const jsonText = JSON.stringify(logs, null, 2);

      const blob = new Blob([jsonText], {
        type: "application/json"
      });

      const url = URL.createObjectURL(blob);

      const date = new Date().toISOString().slice(0, 10);

      const downloadLink = document.createElement("a");
      downloadLink.href = url;
      downloadLink.download = `time-logs-${date}.json`;

      document.body.appendChild(downloadLink);
      downloadLink.click();

      document.body.removeChild(downloadLink);
      URL.revokeObjectURL(url);
    }

    function wipeLogs() {
      const confirmed = confirm("Delete all logs?");

      if (!confirmed) {
        return;
      }

      logs = [];
      localStorage.removeItem("timeLogs");
      renderLogs();
    }
  </script>

</body>
</html>
